<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mechismu Racing Electric · Team Progress Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0D0F14; --surface:#13161E; --surface2:#1B1F2B; --border:#252935;
  --accent:#C8F400; --accent2:#7DFFB3; --warn:#FF7A45; --muted:#4A5068;
  --text:#E4E8F5; --text2:#8B92A8;
  --mono:'JetBrains Mono',monospace; --sans:'Inter',sans-serif;
  --radius:8px; --gutter:24px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;min-height:100vh}
button{cursor:pointer;border:none;background:none;font-family:inherit}
input,textarea,select{font-family:inherit}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* TELEMETRY BAR */
#telemetry{
  position:sticky;top:0;z-index:100;
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:10px var(--gutter);display:flex;align-items:center;gap:16px;flex-wrap:wrap;
}
.tele-brand{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--accent);letter-spacing:.08em;white-space:nowrap}
.tele-race{flex:1;min-width:180px;display:flex;flex-direction:column;gap:4px}
.tele-label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.tele-bar-track{height:6px;background:var(--border);border-radius:99px;overflow:hidden}
.tele-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width .6s ease}
.tele-stats{display:flex;gap:16px;flex-wrap:wrap}
.tele-stat{display:flex;flex-direction:column;align-items:center;min-width:44px}
.tele-stat-val{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--accent);line-height:1}
.tele-stat-key{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.tele-sync{display:flex;align-items:center;gap:8px}
.sync-status{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:99px;white-space:nowrap}
.sync-status.ok{background:rgba(125,255,179,.1);color:var(--accent2);border:1px solid rgba(125,255,179,.2)}
.sync-status.saving{background:rgba(200,244,0,.1);color:var(--accent);border:1px solid rgba(200,244,0,.2)}
.sync-status.err{background:rgba(255,122,69,.1);color:var(--warn);border:1px solid rgba(255,122,69,.2)}
.sync-status.uncfg{background:rgba(74,80,104,.15);color:var(--muted);border:1px solid var(--border)}
.mode-badge{padding:4px 10px;border-radius:99px;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;font-family:var(--mono)}
.mode-badge.edit-mode{background:rgba(200,244,0,.15);color:var(--accent);border:1px solid rgba(200,244,0,.3)}
.mode-badge.view-mode{background:rgba(125,255,179,.1);color:var(--accent2);border:1px solid rgba(125,255,179,.2)}
.switch-mode-btn{padding:6px 14px;border-radius:var(--radius);font-size:11px;font-weight:600;letter-spacing:.05em;border:1px solid var(--border);color:var(--text2);transition:all .2s}
.switch-mode-btn:hover{border-color:var(--accent);color:var(--accent)}

/* LAYOUT */
#app{display:flex;min-height:calc(100vh - 56px)}
#sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);padding:20px 0;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
.sidebar-section-label{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;padding:0 16px 8px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;transition:background .15s;border-left:2px solid transparent}
.sidebar-item:hover{background:var(--surface2)}
.sidebar-item.active{background:rgba(200,244,0,.06);border-left-color:var(--accent)}
.div-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.div-name{font-size:12px;font-weight:500;color:var(--text);flex:1;line-height:1.3}
.div-pct{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--accent2)}
.sidebar-divider{height:1px;background:var(--border);margin:12px 16px}
.sidebar-nav-item{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;font-size:12px;color:var(--text2);transition:color .15s}
.sidebar-nav-item:hover{color:var(--text)}
.sidebar-nav-item.active{color:var(--accent)}
#main{flex:1;overflow-y:auto;padding:var(--gutter)}

/* SETUP MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px;max-width:520px;width:100%}
.modal h2{font-size:18px;font-weight:700;margin-bottom:6px}
.modal p{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.6}
.modal-field{margin-bottom:14px}
.modal-label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;display:block}
.modal-input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:6px;font-size:13px;outline:none;transition:border-color .15s}
.modal-input:focus{border-color:var(--accent)}
.modal-help{font-size:11px;color:var(--muted);margin-top:4px}
.modal-help a{color:var(--accent2)}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.btn-primary{padding:9px 20px;border-radius:6px;background:var(--accent);color:#000;font-weight:700;font-size:12px;letter-spacing:.05em;transition:all .2s;flex:1}
.btn-primary:hover{background:#d4ff20}
.btn-secondary{padding:9px 20px;border-radius:6px;border:1px solid var(--border);color:var(--text2);font-size:12px;transition:all .2s}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.modal-warning{background:rgba(255,122,69,.08);border:1px solid rgba(255,122,69,.2);border-radius:6px;padding:10px 14px;font-size:12px;color:var(--warn);margin-bottom:16px}

/* VIEWS */
.view-tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:4px;width:fit-content}
.view-tab{padding:6px 16px;border-radius:6px;font-size:12px;font-weight:600;color:var(--text2);transition:all .2s}
.view-tab.active{background:var(--surface2);color:var(--text)}
.view-tab:hover:not(.active){color:var(--text)}
.page-header{margin-bottom:24px}
.page-header h1{font-size:22px;font-weight:700;color:var(--text)}
.page-header p{color:var(--text2);font-size:13px;margin-top:4px}

/* OVERVIEW */
.overview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:32px}
.div-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:border-color .2s,transform .15s}
.div-card:hover{border-color:var(--accent);transform:translateY(-1px)}
.div-card-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px}
.div-card-icon{font-size:24px}
.div-card-title{font-size:13px;font-weight:600;flex:1}
.div-card-pct{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--accent)}
.prog-bar-track{height:5px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:10px}
.prog-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width .5s ease}
.prog-bar-fill.warn{background:linear-gradient(90deg,#FF7A45,#FFB545)}
.div-card-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);font-family:var(--mono)}

/* DIVISION DETAIL */
.detail-header{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.detail-icon{font-size:32px}
.detail-title{font-size:20px;font-weight:700}
.detail-subtitle{font-size:12px;color:var(--text2);margin-top:2px}
.detail-back{margin-left:auto;padding:6px 14px;border:1px solid var(--border);border-radius:var(--radius);font-size:12px;color:var(--text2);transition:all .2s}
.detail-back:hover{border-color:var(--accent);color:var(--accent)}
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.section-card-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-family:var(--mono);margin-bottom:14px}

/* TARGETS */
.targets-list{display:flex;flex-direction:column;gap:8px}
.target-row{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:6px;background:var(--surface2);border:1px solid transparent;transition:border-color .15s}
.target-row:hover{border-color:var(--border)}
.target-row.done{opacity:.6}
.target-row.done .target-text{text-decoration:line-through;color:var(--text2)}
.target-check{width:18px;height:18px;border-radius:4px;flex-shrink:0;border:2px solid var(--border);margin-top:1px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.target-check.checked{background:var(--accent);border-color:var(--accent)}
.target-check.checked::after{content:'✓';font-size:11px;color:#000;font-weight:700}
.target-text{flex:1;font-size:13px;color:var(--text);padding-top:1px}
.target-del{font-size:16px;color:var(--muted);padding:0 4px;flex-shrink:0;transition:color .15s;line-height:1.4}
.target-del:hover{color:var(--warn)}
.add-target-row{display:flex;gap:8px;margin-top:10px}
.add-target-input{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-size:13px;outline:none;transition:border-color .15s}
.add-target-input:focus{border-color:var(--accent)}
.add-target-btn{padding:8px 16px;border-radius:6px;background:rgba(200,244,0,.12);border:1px solid rgba(200,244,0,.3);color:var(--accent);font-size:12px;font-weight:600;transition:all .2s}
.add-target-btn:hover{background:rgba(200,244,0,.2)}

/* REMARKS */
.remarks-box{width:100%;min-height:80px;resize:vertical;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:12px;border-radius:6px;font-size:13px;font-family:var(--sans);outline:none;transition:border-color .15s;line-height:1.6}
.remarks-box:focus{border-color:var(--accent)}
.remarks-box:disabled{opacity:.7;resize:none;cursor:default}
.save-btn{margin-top:10px;padding:8px 20px;border-radius:6px;background:var(--accent);color:#000;font-weight:700;font-size:12px;letter-spacing:.05em;transition:all .2s}
.save-btn:hover{background:#d4ff20}
.save-btn:disabled{opacity:.5;cursor:not-allowed}

/* HISTORY */
.history-week{border:1px solid var(--border);border-radius:6px;margin-bottom:10px;overflow:hidden}
.history-week-header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface2);cursor:pointer;user-select:none}
.history-week-label{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--text2);flex:1}
.history-week-pct{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--accent)}
.history-week-chevron{color:var(--muted);font-size:12px;transition:transform .2s}
.history-week-chevron.open{transform:rotate(90deg)}
.history-week-body{padding:14px;display:none}
.history-week-body.open{display:block}
.history-target{font-size:12px;color:var(--text2);padding:3px 0}
.history-target.done{color:var(--accent2)}
.history-target.done::before{content:'✓ '}
.history-target:not(.done)::before{content:'○ '}
.history-remarks{margin-top:10px;padding:10px;background:var(--bg);border-radius:4px;font-size:12px;color:var(--text2);border-left:2px solid var(--border)}
.history-remarks-label{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.empty-history{text-align:center;padding:30px;font-size:13px;color:var(--muted)}

/* MONTHLY */
.monthly-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.monthly-div-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.monthly-div-title{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;margin-bottom:12px}
.monthly-div-icon{font-size:18px}
.monthly-weeks{display:flex;flex-direction:column;gap:6px}
.monthly-week-row{display:flex;align-items:center;gap:8px}
.monthly-week-label{font-family:var(--mono);font-size:10px;color:var(--muted);width:44px;flex-shrink:0}
.monthly-week-bar{flex:1;height:8px;background:var(--border);border-radius:99px;overflow:hidden}
.monthly-week-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width .5s}
.monthly-week-pct{font-family:var(--mono);font-size:10px;color:var(--text2);width:30px;text-align:right}
.monthly-avg{margin-top:12px;padding-top:10px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px}
.monthly-avg-label{color:var(--muted)}
.monthly-avg-val{color:var(--accent);font-weight:700}

/* WEEK NAV */
.week-nav{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.week-nav-btn{padding:6px 12px;border-radius:var(--radius);border:1px solid var(--border);color:var(--text2);font-size:12px;transition:all .2s}
.week-nav-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.week-nav-btn:disabled{opacity:.4;cursor:not-allowed}
.week-nav-current{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--text);padding:6px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
.week-nav-current.is-current{border-color:rgba(200,244,0,.3);color:var(--accent)}

/* SPINNER */
.spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(200,244,0,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;z-index:999;background:var(--surface2);border:1px solid var(--accent);color:var(--text);padding:10px 16px;border-radius:var(--radius);font-size:12px;font-family:var(--mono);transform:translateY(60px);opacity:0;transition:all .3s;pointer-events:none}
#toast.show{transform:translateY(0);opacity:1}
#toast.err{border-color:var(--warn)}

@media(max-width:768px){#sidebar{display:none}#main{padding:16px}.overview-grid{grid-template-columns:1fr}}
</style>
</head>

<script>
// ═══════════════════════ CONSTANTS ═══════════════════════
const DIVISIONS = [
  {id:'chassis',    name:'Chassis',                     icon:'🏗️'},
  {id:'drivetrain', name:'Drivetrain',                  icon:'⚙️'},
  {id:'suspension', name:'Steering & Suspension',       icon:'🔧'},
  {id:'brakes',     name:'Brakes',                      icon:'🛑'},
  {id:'battery',    name:'Battery Pack & BMS',          icon:'🔋'},
  {id:'motor',      name:'Motor & Motor Controller',    icon:'⚡'},
  {id:'safety',     name:'Safety Circuits & LV System', icon:'🛡️'},
];

// ═══════════════════════ WEEK UTILS ══════════════════════
function getWeekKey(date=new Date()){
  const d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));
  const dow=d.getUTCDay()||7; d.setUTCDate(d.getUTCDate()+4-dow);
  const ys=new Date(Date.UTC(d.getUTCFullYear(),0,1));
  const wk=Math.ceil(((d-ys)/86400000+1)/7);
  return `${d.getUTCFullYear()}-W${String(wk).padStart(2,'0')}`;
}
function weekLabel(key){
  const [yr,w]=key.split('-W');
  const d=new Date(Date.UTC(+yr,0,1));
  const dow=d.getUTCDay()||7;
  const s1=new Date(Date.UTC(+yr,0,1+(dow<=4?1-dow:8-dow)));
  const ws=new Date(s1.getTime()+(+w-1)*7*86400000);
  const we=new Date(ws.getTime()+6*86400000);
  const f=x=>x.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  return `${f(ws)} – ${f(we)}, ${yr}`;
}
function shiftWeek(key,delta){
  const [yr,w]=key.split('-W');
  const d=new Date(Date.UTC(+yr,0,1));
  const dow=d.getUTCDay()||7;
  const s1=new Date(Date.UTC(+yr,0,1+(dow<=4?1-dow:8-dow)));
  const ws=new Date(s1.getTime()+(+w-1)*7*86400000);
  ws.setUTCDate(ws.getUTCDate()+delta*7);
  return getWeekKey(ws);
}

// ═══════════════════════ GITHUB API ══════════════════════
function getCfg(){
  try{return JSON.parse(localStorage.getItem('fsae_gh_cfg')||'null');}catch{return null;}
}
function saveCfg(cfg){localStorage.setItem('fsae_gh_cfg',JSON.stringify(cfg));}

async function ghFetch(path,opts={}){
  const cfg=getCfg();
  if(!cfg) throw new Error('Not configured');
  const res=await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${path}`,{
    ...opts,
    headers:{
      'Authorization':`token ${cfg.token}`,
      'Accept':'application/vnd.github.v3+json',
      'Content-Type':'application/json',
      ...(opts.headers||{})
    }
  });
  if(!res.ok){
    const e=await res.json().catch(()=>({}));
    throw new Error(e.message||`GitHub API error ${res.status}`);
  }
  return res.json();
}

async function loadRemoteData(){
  const cfg=getCfg();
  if(!cfg){
    // Try loading data.json from same origin (for public view without token)
    try{
      const res=await fetch('./data.json');
      if(res.ok) return await res.json();
    }catch{}
    return {};
  }
  try{
    const file=await ghFetch('data.json');
    const decoded=atob(file.content.replace(/\n/g,''));
    return JSON.parse(decoded);
  }catch(e){
    if(e.message&&e.message.includes('Not Found')) return {}; // file doesn't exist yet
    throw e;
  }
}

async function saveRemoteData(data){
  const cfg=getCfg();
  if(!cfg) throw new Error('Not configured');
  // Get current SHA if file exists
  let sha=null;
  try{
    const existing=await ghFetch('data.json');
    sha=existing.sha;
  }catch{}
  const content=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));
  const body={message:`tracker: update data ${new Date().toISOString()}`,content};
  if(sha) body.sha=sha;
  await ghFetch('data.json',{method:'PUT',body:JSON.stringify(body)});
}

// ═══════════════════════ APP STATE ═══════════════════════
const state={
  mode:'view',
  view:'overview',
  activeDivId:null,
  currentWeek:getWeekKey(),
  data:{},
  syncStatus:'uncfg', // uncfg | ok | saving | err
  loading:true,
};

// ═══════════════════════ DATA HELPERS ════════════════════
function getDivWeek(divId,weekKey){
  if(!state.data[divId]) state.data[divId]={};
  if(!state.data[divId][weekKey]) state.data[divId][weekKey]={targets:[],remarks:''};
  return state.data[divId][weekKey];
}
function getCompletion(entry){
  if(!entry||!entry.targets||!entry.targets.length) return null;
  return Math.round(entry.targets.filter(t=>t.done).length/entry.targets.length*100);
}

// ═══════════════════════ SYNC ════════════════════════════
let _savePending=false, _saveTimer=null;
function scheduleSave(){
  _savePending=true;
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(flushSave, 1500);
}
async function flushSave(){
  if(!_savePending) return;
  _savePending=false;
  setSyncStatus('saving');
  try{
    await saveRemoteData(state.data);
    setSyncStatus('ok');
    showToast('✓ Saved to GitHub');
  }catch(e){
    setSyncStatus('err',e.message);
    showToast('⚠ Save failed: '+e.message,true);
  }
}
function setSyncStatus(s,msg=''){
  state.syncStatus=s;
  const el=document.getElementById('sync-status');
  if(!el) return;
  const map={
    uncfg:'⚙ Not configured',
    ok:'✓ Synced',
    saving:'<span class="spinner"></span> Saving…',
    err:'✗ Sync error'
  };
  el.innerHTML=msg?`✗ ${msg.slice(0,30)}`:map[s];
  el.className='sync-status '+s;
}

// ═══════════════════════ RENDER ══════════════════════════
function render(){
  renderTelemetry();
  renderSidebar();
  renderMain();
}

function renderTelemetry(){
  const {data,currentWeek,mode}=state;
  let total=0,done=0,divsDone=0;
  DIVISIONS.forEach(div=>{
    const e=data[div.id]?.[currentWeek];
    if(e&&e.targets.length){
      total+=e.targets.length;
      const d=e.targets.filter(t=>t.done).length;
      done+=d;
      if(d===e.targets.length) divsDone++;
    }
  });
  const pct=total>0?Math.round(done/total*100):0;
  document.getElementById('tele-bar').style.width=pct+'%';
  document.getElementById('tele-stats').innerHTML=`
    <div class="tele-stat"><div class="tele-stat-val">${pct}%</div><div class="tele-stat-key">Complete</div></div>
    <div class="tele-stat"><div class="tele-stat-val">${done}</div><div class="tele-stat-key">Done</div></div>
    <div class="tele-stat"><div class="tele-stat-val">${total}</div><div class="tele-stat-key">Total</div></div>
    <div class="tele-stat"><div class="tele-stat-val">${divsDone}</div><div class="tele-stat-key">Divs✓</div></div>`;
  setSyncStatus(state.syncStatus);
  const badge=document.getElementById('mode-badge');
  badge.textContent=mode==='edit'?'LEAD EDIT':'VIEW MODE';
  badge.className='mode-badge '+(mode==='edit'?'edit-mode':'view-mode');
  const btn=document.getElementById('switch-mode-btn');
  btn.textContent=mode==='edit'?'→ Viewer':'→ Lead Edit';
  btn.onclick=()=>handleModeSwitch();
}

function handleModeSwitch(){
  if(state.mode==='edit'){state.mode='view';render();return;}
  const cfg=getCfg();
  if(!cfg){showModal('setup');return;}
  const pw=prompt('Enter lead password:');
  const storedPw=cfg.leadPw||'fsae2025';
  if(pw===storedPw){state.mode='edit';render();}
  else if(pw!==null) showToast('Incorrect password',true);
}

function renderSidebar(){
  const {data,currentWeek,view,activeDivId}=state;
  const c=document.getElementById('sidebar-divisions');
  c.innerHTML=DIVISIONS.map(div=>{
    const e=data[div.id]?.[currentWeek];
    const pct=getCompletion(e);
    const active=view==='division'&&activeDivId===div.id;
    return `<div class="sidebar-item ${active?'active':''}" data-div="${div.id}">
      <span class="div-icon">${div.icon}</span>
      <span class="div-name">${div.name}</span>
      <span class="div-pct">${pct!==null?pct+'%':'—'}</span>
    </div>`;
  }).join('');
  c.querySelectorAll('.sidebar-item').forEach(el=>{
    el.addEventListener('click',()=>{state.view='division';state.activeDivId=el.dataset.div;render();});
  });
  ['overview','monthly'].forEach(v=>{
    const el=document.getElementById('nav-'+v);
    if(el){el.className='sidebar-nav-item'+(view===v?' active':'');el.onclick=()=>{state.view=v;render();};}
  });
  const setup=document.getElementById('nav-setup');
  if(setup) setup.onclick=()=>showModal('setup');
}

function renderMain(){
  const m=document.getElementById('main');
  if(state.view==='overview') m.innerHTML=buildOverview();
  else if(state.view==='monthly') m.innerHTML=buildMonthly();
  else if(state.view==='division') m.innerHTML=buildDivision(state.activeDivId);
  attachMainEvents();
}

// ═══════════════════════ BUILD OVERVIEW ══════════════════
function buildOverview(){
  const {data,currentWeek}=state;
  return `
    <div class="page-header">
      <h1>Team Overview</h1>
      <p>All divisions · ${weekLabel(currentWeek)}</p>
    </div>
    ${buildWeekNav()}
    <div class="overview-grid">
      ${DIVISIONS.map(div=>{
        const e=data[div.id]?.[currentWeek]||{targets:[],remarks:''};
        const total=e.targets.length, done=e.targets.filter(t=>t.done).length;
        const pct=total>0?Math.round(done/total*100):0;
        return `<div class="div-card" data-div="${div.id}">
          <div class="div-card-header">
            <span class="div-card-icon">${div.icon}</span>
            <span class="div-card-title">${div.name}</span>
            <span class="div-card-pct">${total>0?pct+'%':'—'}</span>
          </div>
          <div class="prog-bar-track"><div class="prog-bar-fill${pct<40&&total>0?' warn':''}" style="width:${pct}%"></div></div>
          <div class="div-card-meta">
            <span>${done}/${total} targets</span>
            <span>${e.remarks?'💬 has remarks':''}</span>
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

// ═══════════════════════ BUILD MONTHLY ═══════════════════
function buildMonthly(){
  const {data,currentWeek}=state;
  const weeks=[];let w=currentWeek;
  for(let i=0;i<4;i++){weeks.unshift(w);w=shiftWeek(w,-1);}
  return `
    <div class="page-header"><h1>Monthly Progress</h1><p>Last 4 weeks per division</p></div>
    <div class="monthly-grid">
      ${DIVISIONS.map(div=>{
        const wrows=weeks.map(wk=>{
          const e=data[div.id]?.[wk];
          const pct=getCompletion(e)??0;
          return `<div class="monthly-week-row">
            <span class="monthly-week-label">W${wk.split('-W')[1]}</span>
            <div class="monthly-week-bar"><div class="monthly-week-bar-fill" style="width:${pct}%"></div></div>
            <span class="monthly-week-pct">${getCompletion(e)!==null?pct+'%':'—'}</span>
          </div>`;
        }).join('');
        const avg=Math.round(weeks.map(wk=>getCompletion(data[div.id]?.[wk])??0).reduce((a,b)=>a+b,0)/weeks.length);
        return `<div class="monthly-div-card">
          <div class="monthly-div-title"><span class="monthly-div-icon">${div.icon}</span>${div.name}</div>
          <div class="monthly-weeks">${wrows}</div>
          <div class="monthly-avg"><span class="monthly-avg-label">4-week avg</span><span class="monthly-avg-val">${avg}%</span></div>
        </div>`;
      }).join('')}
    </div>`;
}

// ═══════════════════════ BUILD DIVISION ══════════════════
function buildDivision(divId){
  const div=DIVISIONS.find(d=>d.id===divId);
  const {data,currentWeek,mode}=state;
  const entry=getDivWeek(divId,currentWeek);
  const total=entry.targets.length, done=entry.targets.filter(t=>t.done).length;
  const pct=total>0?Math.round(done/total*100):0;
  const isEdit=mode==='edit';
  const histKeys=Object.keys(data[divId]||{}).filter(k=>k!==currentWeek).sort((a,b)=>b.localeCompare(a)).slice(0,10);
  const histHTML=histKeys.length?histKeys.map(wk=>{
    const e=data[divId][wk];
    const t=e.targets.length,d=e.targets.filter(x=>x.done).length,p=t>0?Math.round(d/t*100):0;
    return `<div class="history-week">
      <div class="history-week-header" data-wk="${wk}">
        <span class="history-week-label">W${wk.split('-W')[1]} · ${weekLabel(wk)}</span>
        <span class="history-week-pct">${t>0?p+'%':'—'}</span>
        <span class="history-week-chevron">▶</span>
      </div>
      <div class="history-week-body" id="hist-${wk}">
        ${e.targets.map(tg=>`<div class="history-target ${tg.done?'done':''}">${esc(tg.text)}</div>`).join('')||'<div style="color:var(--muted);font-size:12px">No targets recorded.</div>'}
        ${e.remarks?`<div class="history-remarks"><div class="history-remarks-label">Remarks</div>${esc(e.remarks)}</div>`:''}
      </div>
    </div>`;
  }).join(''):`<div class="empty-history">No history yet for this division.</div>`;

  return `
    <div class="detail-header">
      <span class="detail-icon">${div.icon}</span>
      <div><div class="detail-title">${div.name}</div><div class="detail-subtitle">${weekLabel(currentWeek)}</div></div>
      <button class="detail-back" id="back-btn">← All Divisions</button>
    </div>
    ${buildWeekNav()}
    <div class="section-card">
      <div class="section-card-title">Week Progress</div>
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:10px">
        <div style="flex:1"><div class="prog-bar-track" style="height:10px"><div class="prog-bar-fill${pct<40&&total>0?' warn':''}" style="width:${pct}%"></div></div></div>
        <div style="font-family:var(--mono);font-size:22px;font-weight:700;color:var(--accent);min-width:48px;text-align:right">${pct}%</div>
      </div>
      <div style="display:flex;gap:24px;font-family:var(--mono);font-size:12px;color:var(--text2)">
        <span>✅ ${done} completed</span><span>○ ${total-done} pending</span><span>📋 ${total} total</span>
      </div>
    </div>
    <div class="section-card">
      <div class="section-card-title">Weekly Targets</div>
      <div class="targets-list" id="targets-list">
        ${entry.targets.length?entry.targets.map((t,i)=>`
          <div class="target-row ${t.done?'done':''}" data-idx="${i}">
            <div class="target-check ${t.done?'checked':''}" data-check="${i}"></div>
            <span class="target-text">${esc(t.text)}</span>
            ${isEdit?`<button class="target-del" data-del="${i}">✕</button>`:''}
          </div>`).join(''):
          `<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px">${isEdit?'No targets yet. Add one below.':'No targets set for this week.'}</div>`}
      </div>
      ${isEdit?`<div class="add-target-row">
        <input class="add-target-input" id="new-target-input" placeholder="Add a new target… (press Enter)" maxlength="200">
        <button class="add-target-btn" id="add-target-btn">+ Add</button>
      </div>`:''}
    </div>
    <div class="section-card">
      <div class="section-card-title">Week Remarks / Notes</div>
      <textarea class="remarks-box" id="remarks-box" ${!isEdit?'disabled':''}
        placeholder="Add notes, blockers, decisions, or observations for this week…">${esc(entry.remarks)}</textarea>
      ${isEdit?`<button class="save-btn" id="save-remarks-btn">Save Remarks</button>`:''}
    </div>
    <div class="section-card">
      <div class="section-card-title">Past Weeks History</div>
      ${histHTML}
    </div>`;
}

function buildWeekNav(){
  const {currentWeek}=state;
  const todayKey=getWeekKey();
  const isCurrent=currentWeek===todayKey;
  return `<div class="week-nav">
    <button class="week-nav-btn" id="prev-week">← Prev</button>
    <span class="week-nav-current ${isCurrent?'is-current':''}">Week ${currentWeek.split('-W')[1]} · ${weekLabel(currentWeek)}</span>
    <button class="week-nav-btn" id="next-week" ${isCurrent?'disabled':''}>Next →</button>
    ${!isCurrent?`<button class="week-nav-btn" id="go-current" style="border-color:rgba(200,244,0,.3);color:var(--accent)">↩ Current</button>`:''}
  </div>`;
}

// ═══════════════════════ EVENTS ══════════════════════════
function attachMainEvents(){
  document.querySelectorAll('.div-card').forEach(el=>{
    el.addEventListener('click',()=>{state.view='division';state.activeDivId=el.dataset.div;render();});
  });
  const back=document.getElementById('back-btn');
  if(back) back.addEventListener('click',()=>{state.view='overview';render();});
  const pBtn=document.getElementById('prev-week');
  const nBtn=document.getElementById('next-week');
  const cBtn=document.getElementById('go-current');
  if(pBtn) pBtn.addEventListener('click',()=>{state.currentWeek=shiftWeek(state.currentWeek,-1);render();});
  if(nBtn) nBtn.addEventListener('click',()=>{state.currentWeek=shiftWeek(state.currentWeek,1);render();});
  if(cBtn) cBtn.addEventListener('click',()=>{state.currentWeek=getWeekKey();render();});

  document.querySelectorAll('[data-check]').forEach(el=>{
    el.addEventListener('click',()=>{
      if(state.mode!=='edit'){showToast('Switch to Lead Edit mode to make changes',true);return;}
      const i=+el.dataset.check;
      const e=getDivWeek(state.activeDivId,state.currentWeek);
      e.targets[i].done=!e.targets[i].done;
      scheduleSave(); render();
    });
  });
  document.querySelectorAll('[data-del]').forEach(el=>{
    el.addEventListener('click',()=>{
      const i=+el.dataset.del;
      if(!confirm('Delete this target?')) return;
      const e=getDivWeek(state.activeDivId,state.currentWeek);
      e.targets.splice(i,1);
      scheduleSave(); render();
    });
  });
  const addBtn=document.getElementById('add-target-btn');
  const addInp=document.getElementById('new-target-input');
  if(addBtn&&addInp){
    const doAdd=()=>{
      const txt=addInp.value.trim();
      if(!txt) return;
      const e=getDivWeek(state.activeDivId,state.currentWeek);
      e.targets.push({text:txt,done:false});
      scheduleSave(); render();
      setTimeout(()=>{const i=document.getElementById('new-target-input');if(i)i.focus();},50);
    };
    addBtn.addEventListener('click',doAdd);
    addInp.addEventListener('keydown',ev=>{if(ev.key==='Enter') doAdd();});
  }
  const saveRem=document.getElementById('save-remarks-btn');
  const remBox=document.getElementById('remarks-box');
  if(saveRem&&remBox){
    saveRem.addEventListener('click',async()=>{
      const e=getDivWeek(state.activeDivId,state.currentWeek);
      e.remarks=remBox.value;
      scheduleSave(); renderTelemetry(); renderSidebar();
      showToast('Remarks queued for save…');
    });
  }
  document.querySelectorAll('.history-week-header').forEach(el=>{
    el.addEventListener('click',()=>{
      const wk=el.dataset.wk;
      const body=document.getElementById('hist-'+wk);
      const ch=el.querySelector('.history-week-chevron');
      body.classList.toggle('open'); ch.classList.toggle('open');
    });
  });
}

// ═══════════════════════ SETUP MODAL ═════════════════════
function showModal(type){
  const cfg=getCfg()||{};
  const overlay=document.createElement('div');
  overlay.className='modal-overlay';
  overlay.innerHTML=`
    <div class="modal">
      <h2>⚙️ GitHub Storage Setup</h2>
      <p>Connect this tracker to a GitHub repository so all data is stored as <code>data.json</code> in your repo. All team members share the same data automatically.</p>
      <div class="modal-warning">⚠️ Your Personal Access Token is stored only in <em>this browser's</em> localStorage and never sent anywhere except the GitHub API. Only leads need to enter this — viewers just need the hosted URL.</div>
      <div class="modal-field">
        <label class="modal-label">GitHub Username / Org</label>
        <input class="modal-input" id="cfg-owner" placeholder="e.g. your-username" value="${cfg.owner||''}">
      </div>
      <div class="modal-field">
        <label class="modal-label">Repository Name</label>
        <input class="modal-input" id="cfg-repo" placeholder="e.g. fsae-tracker" value="${cfg.repo||''}">
      </div>
      <div class="modal-field">
        <label class="modal-label">Personal Access Token (PAT)</label>
        <input class="modal-input" id="cfg-token" type="password" placeholder="ghp_xxxxxxxxxxxx" value="${cfg.token||''}">
        <div class="modal-help">Create at <a href="https://github.com/settings/tokens/new" target="_blank">github.com/settings/tokens/new</a> — needs <strong>repo</strong> scope. Only leads need this.</div>
      </div>
      <div class="modal-field">
        <label class="modal-label">Lead Password (for edit mode)</label>
        <input class="modal-input" id="cfg-pw" type="password" placeholder="fsae2025" value="${cfg.leadPw||''}">
      </div>
      <div class="modal-actions">
        <button class="btn-primary" id="cfg-save">Save & Connect</button>
        <button class="btn-secondary" id="cfg-cancel">Cancel</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById('cfg-cancel').onclick=()=>overlay.remove();
  overlay.addEventListener('click',e=>{if(e.target===overlay) overlay.remove();});
  document.getElementById('cfg-save').onclick=async()=>{
    const owner=document.getElementById('cfg-owner').value.trim();
    const repo=document.getElementById('cfg-repo').value.trim();
    const token=document.getElementById('cfg-token').value.trim();
    const leadPw=document.getElementById('cfg-pw').value||'fsae2025';
    if(!owner||!repo||!token){showToast('Please fill in all required fields',true);return;}
    const btn=document.getElementById('cfg-save');
    btn.disabled=true; btn.textContent='Testing connection…';
    try{
      saveCfg({owner,repo,token,leadPw});
      // test connection
      await ghFetch(`?ref=main`);
      // load data from repo
      setSyncStatus('saving');
      const fresh=await loadRemoteData();
      state.data=fresh;
      setSyncStatus('ok');
      overlay.remove();
      showToast('✓ Connected to GitHub!');
      render();
    }catch(e){
      btn.disabled=false; btn.textContent='Save & Connect';
      showToast('Connection failed: '+e.message,true);
    }
  };
}

// ═══════════════════════ UTILS ═══════════════════════════
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(msg,err=false){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='show'+(err?' err':'');
  clearTimeout(el._t); el._t=setTimeout(()=>el.className='',3000);
}

// ═══════════════════════ INIT ════════════════════════════
async function init(){
  render(); // render skeleton first
  const cfg=getCfg();
  if(cfg){
    setSyncStatus('saving');
    try{
      state.data=await loadRemoteData();
      setSyncStatus('ok');
    }catch(e){
      setSyncStatus('err',e.message);
      showToast('Could not load from GitHub: '+e.message,true);
    }
  } else {
    // Try loading public data.json from same folder
    try{
      const res=await fetch('./data.json');
      if(res.ok){state.data=await res.json(); setSyncStatus('ok');}
    }catch{}
  }
  state.loading=false;
  render();
}
init();
</script>
